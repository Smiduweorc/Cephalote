version: 2
updates:
  # Go modules (the shipped binary)
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI and release workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        update-types:
          - minor
          - patch

  # npm dev tooling (git hooks, commit linting, changelog)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      dev-tooling:
        update-types:
          - minor
          - patch

  # Base images used by the Dockerfile
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
